<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AWAKAN</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

  <!--OUTline-->

<button id="back" style="width: 40px;height: 40px; border: none; border-radius: 20px;background-color:none;margin-left: 70px;" onclick="window.location.href='./A1H.html'">
<img src="arrow_back_24dp_75FB4C_FILL0_wght400_GRAD0_opsz24.png" alt="">

</button>


  <div class="container">
    <h2 style="color: #FAE4B0;text-align: center;"> LOGIN </h2>
    <input id="u2" type="text" placeholder="Enter Username"
      style="border: 1px solid aliceblue; border-radius: 10px;height:32px;">
    <input id="p2" type="password" placeholder="Enter Password"
      style="border: 1px solid aliceblue; border-radius: 10px;height:32px;">
    <button id="s2" style="border: 1px solid aliceblue; border-radius: 10px;height:32px;background-color:#FAE4B0;">LOG
      IN</button>
    <a href="./A1R.HTML" style="text-decoration: underline;color: bisque;">Not a USER | Register Now</a>
  </div>





  <!--STYLE-->
  <style>
    .container {
      width: 35vw;
      height: 45vh;
      background-color: #84AFB4;
      border-radius: 20px;
      display: flex;
      align-items: center;
      flex-direction: column;
      justify-content: center;
      justify-content: space-evenly;
      border: 1.2px solid grey;
    }

    body {
      margin: 0;
      background-color: #9DD9D2;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
    }

    @media (max-width:480px){

    body{
        padding:15px;
        margin-left: -50px;
        gap:18px;
    }

    .container{
        width:100%;
        min-width:0;
        height:auto;
        min-height:420px;
        border-radius:15px;
        padding:25px 20px;
    }

}



@media (max-width:320px){

    .container{
        padding:15px;
        min-height:380px;
    }

}
  </style>

  <!--script-->







  <script>


  let s = document.querySelector("#s2");

s.addEventListener("click touchend", async () => {

    let u = document.querySelector("#u2").value;
    let p = document.querySelector("#p2").value;

    try {

        let response = await fetch("http://localhost:4000/L1", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ u, p })
        });

        let body = await response.json();

        console.log(body);
if(response.status===500){
          window.location.href="./A1L.html";
            alert("Login Failed");
}
        if (response.status === 200) {
            localStorage.setItem("id", body.uid);
            window.location.href = "./UA1L.html";
        } 

    } catch (err) {
        console.log(err);
        alert("Server Connection Error");
    }

});


  </script>



















  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

    crossorigin="anonymous"></script>
</body>

</html>
