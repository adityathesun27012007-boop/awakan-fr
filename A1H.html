    <style>
        * {
            margin: 0;
            padding: 0;

        }

        body {
            width: 100vw;
            height: 100vh;
        }

        .homepage {
            width: 100vw;
            height: 100vh;

            display: grid;
            grid-template-columns: 1fr 70px;

        }

        .hb1 {
            border-radius: 20px;
            border-right: 3px solid white;

        }


/*phones srn*/
@media (max-width:480px){

    .homepage{

        grid-template-columns:1fr;
        grid-template-rows:1fr auto;

    }

    .hb1{
        border-right:none;
        border-bottom:2px solid white;
        border-radius:0;

        padding:15px;
    }

    .hb2{

        flex-direction:row;
        justify-content:space-around;
        align-items:center;

        width:100%;
        min-height:65px;

        padding:10px;
    }

}



@media (max-width:320px){

    }

}
